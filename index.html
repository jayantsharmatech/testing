<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Birthday Gift!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #main-content {
            text-align: center;
            padding: 20px;
        }
        .btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #ff6b81;
        }
        /* Scare Overlay */
        #scare-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        
        /* The CSS Rendered Lizard Frame */
        #lizard-box {
            position: relative;
            width: 300px;
            height: 450px;
            animation: violent-shake 0.1s infinite;
        }
        /* Lizard Body Components */
        .lizard-body {
            position: absolute;
            width: 50px;
            height: 200px;
            background: #556b2f;
            border-radius: 50%;
            top: 100px;
            left: 125px;
            box-shadow: inset -10px -10px 20px #3a4d1f;
        }
        .lizard-head {
            position: absolute;
            width: 40px;
            height: 60px;
            background: #556b2f;
            border-radius: 50% 50% 40% 40%;
            top: 55px;
            left: 130px;
        }
        .eye {
            position: absolute;
            width: 8px;
            height: 8px;
            background: red;
            border-radius: 50%;
            top: 70px;
        }
        .eye.left { left: 138px; }
        .eye.right { right: 138px; }
        .tail {
            position: absolute;
            width: 14px;
            height: 180px;
            background: #556b2f;
            border-radius: 50%;
            top: 270px;
            left: 143px;
            transform-origin: top center;
            transform: rotate(5deg);
        }
        .leg {
            position: absolute;
            width: 70px;
            height: 15px;
            background: #465c24;
            border-radius: 10px;
        }
        .leg.top-left { top: 120px; left: 70px; transform: rotate(20deg); }
        .leg.top-right { top: 120px; right: 70px; transform: rotate(-20deg); }
        .leg.bot-left { top: 230px; left: 65px; transform: rotate(-30deg); }
        .leg.bot-right { top: 230px; right: 65px; transform: rotate(30deg); }

        /* Shaking animation to maximize the jump scare impact */
        @keyframes violent-shake {
            0% { transform: translate(5px, 5px) rotate(0deg) scale(1.4); }
            10% { transform: translate(-5px, -5px) rotate(-3deg) scale(1.4); }
            20% { transform: translate(-8px, 0px) rotate(3deg) scale(1.4); }
            30% { transform: translate(0px, 8px) rotate(0deg) scale(1.4); }
            40% { transform: translate(5px, -5px) rotate(3deg) scale(1.4); }
            50% { transform: translate(-5px, 8px) rotate(-3deg) scale(1.4); }
            60% { transform: translate(-8px, 5px) rotate(0deg) scale(1.4); }
            70% { transform: translate(5px, 5px) rotate(-3deg) scale(1.4); }
            80% { transform: translate(-5px, -5px) rotate(3deg) scale(1.4); }
            90% { transform: translate(5px, 8px) rotate(0deg) scale(1.4); }
            100% { transform: translate(2px, -8px) rotate(-3deg) scale(1.4); }
        }
        .birthday-wish {
            font-size: 2.5rem;
            color: #ff4757;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="main-content">
        <h1>Happy Birthday! 🎁</h1>
        <p>Click below to unlock your interactive birthday video card.</p>
        <button class="btn" id="start-btn">Unlock Gift</button>
    </div>

    <div id="scare-overlay">
        <div id="lizard-box">
            <div class="lizard-head"></div>
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="lizard-body"></div>
            <div class="leg top-left"></div>
            <div class="leg top-right"></div>
            <div class="leg bot-left"></div>
            <div class="leg bot-right"></div>
            <div class="tail"></div>
        </div>
        
        <audio id="scare-audio" src="https://www.soundjay.com/creatures/sounds/monsters-creature-cry-01.mp3" preload="auto"></audio>
    </div>

    <script>
        const mainContent = document.getElementById('main-content');
        const scareOverlay = document.getElementById('scare-overlay');
        const startBtn = document.getElementById('start-btn');
        const audio = document.getElementById('scare-audio');

        startBtn.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen().catch(() => {});
            }
            
            scareOverlay.style.display = 'flex';
            audio.volume = 1.0; 
            audio.play().catch(err => console.log("Audio waiting for player interaction."));

            // Sets screen hold time to exactly 4 seconds
            setTimeout(() => {
                scareOverlay.style.display = 'none';
                
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(() => {});
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen().catch(() => {});
                }

                mainContent.innerHTML = `
                    <h1 class="birthday-wish">🎉 HAPPY BIRTHDAY! 🎉</h1>
                    <h2>Gotcha! Hope this birthday is completely lizard-free! 😂🦎</h2>
                `;
            }, 4000); 
        });
    </script>
</body>
</html>
