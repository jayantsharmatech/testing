<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Birthday Gift!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #main-content {
            text-align: center;
            padding: 20px;
        }
        .btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #ff6b81;
        }
        /* Scare Overlay */
        #scare-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #scare-overlay img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            animation: violent-shake 0.1s infinite;
        }
        /* Violent Shaking Animation */
        @keyframes violent-shake {
            0% { transform: translate(6px, 6px) rotate(0deg) scale(1.15); }
            10% { transform: translate(-6px, -6px) rotate(-3deg) scale(1.15); }
            20% { transform: translate(-9px, 0px) rotate(3deg) scale(1.15); }
            30% { transform: translate(0px, 9px) rotate(0deg) scale(1.15); }
            40% { transform: translate(6px, -6px) rotate(3deg) scale(1.15); }
            50% { transform: translate(-6px, 9px) rotate(-3deg) scale(1.15); }
            60% { transform: translate(-9px, 6px) rotate(0deg) scale(1.15); }
            70% { transform: translate(6px, 6px) rotate(-3deg) scale(1.15); }
            80% { transform: translate(-6px, -6px) rotate(3deg) scale(1.15); }
            90% { transform: translate(6px, 9px) rotate(0deg) scale(1.15); }
            100% { transform: translate(3px, -9px) rotate(-3deg) scale(1.15); }
        }
        .birthday-wish {
            font-size: 2.5rem;
            color: #ff4757;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="main-content">
        <h1>Happy Birthday! 🎁</h1>
        <p>Click below to unlock your interactive birthday video card.</p>
        <button class="btn" id="start-btn">Unlock Gift</button>
    </div>

    <!-- The Scare Layer -->
    <div id="scare-overlay">
        <!-- SVG LIZARD VECTOR EMBEDDED DIRECTLY AS DATA (Instant offline/online load guarantee) -->
        <img id="scare-img" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' width='500' height='500'><rect width='100' height='100' fill='black'/><path d='M50,15 C45,20 42,28 45,35 C46,38 43,42 38,44 C30,48 20,40 15,48 C12,53 18,55 23,53 C32,50 38,55 42,65 C45,72 40,82 50,90 C60,82 55,72 58,65 C62,55 68,50 77,53 C82,55 88,53 85,48 C80,40 70,48 62,44 C57,42 54,38 55,35 C58,28 55,20 50,15 Z' fill='%232ed573'/><circle cx='47' cy='25' r='2' fill='red'/><circle cx='53' cy='25' r='2' fill='red'/><path d='M49,15 Q46,10 43,12 M51,15 Q54,10 57,12' stroke='red' stroke-width='0.8' fill='none'/><path d='M25,49 Q18,45 12,50 M75,49 Q82,45 88,50 M35,62 Q25,65 20,58 M65,62 Q75,65 80,58' stroke='%231e7e34' stroke-width='1.5' fill='none'/></svg>" alt="Scare Lizard">
        
        <!-- Sudden screech audio -->
        <audio id="scare-audio" src="https://www.soundjay.com/creatures/sounds/monsters-creature-cry-01.mp3" preload="auto"></audio>
    </div>

    <script>
        const mainContent = document.getElementById('main-content');
        const scareOverlay = document.getElementById('scare-overlay');
        const startBtn = document.getElementById('start-btn');
        const audio = document.getElementById('scare-audio');

        startBtn.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen().catch(() => {});
            }
            
            scareOverlay.style.display = 'flex';
            audio.volume = 1.0; 
            audio.play().catch(err => console.log("Audio play blocked by browser policies."));

            // FIXED TIME: 4000 milliseconds = Exactly 4 seconds
            setTimeout(() => {
                scareOverlay.style.display = 'none';
                
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(() => {});
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen().catch(() => {});
                }

                mainContent.innerHTML = `
                    <h1 class="birthday-wish">🎉 HAPPY BIRTHDAY! 🎉</h1>
                    <h2>Gotcha! Hope this birthday is completely lizard-free! 😂🦎</h2>
                `;
            }, 4000); 
        });
    </script>
</body>
</html>
