<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Birthday Gift!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #main-content {
            text-align: center;
            padding: 20px;
        }
        .btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #ff6b81;
        }
        /* Scare Overlay */
        #scare-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #scare-overlay img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            animation: violent-shake 0.1s infinite;
        }
        /* Intense shaking animation */
        @keyframes violent-shake {
            0% { transform: translate(5px, 5px) rotate(0deg) scale(1.15); }
            10% { transform: translate(-5px, -5px) rotate(-3deg) scale(1.15); }
            20% { transform: translate(-8px, 0px) rotate(3deg) scale(1.15); }
            30% { transform: translate(0px, 9px) rotate(0deg) scale(1.15); }
            40% { transform: translate(5px, -5px) rotate(3deg) scale(1.15); }
            50% { transform: translate(-5px, 8px) rotate(-3deg) scale(1.15); }
            60% { transform: translate(-8px, 5px) rotate(0deg) scale(1.15); }
            70% { transform: translate(5px, 5px) rotate(-3deg) scale(1.15); }
            80% { transform: translate(-5px, -5px) rotate(3deg) scale(1.15); }
            90% { transform: translate(5px, 8px) rotate(0deg) scale(1.15); }
            100% { transform: translate(2px, -8px) rotate(-3deg) scale(1.15); }
        }
        .birthday-wish {
            font-size: 2.5rem;
            color: #ff4757;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="main-content">
        <h1>Happy Birthday! 🎁</h1>
        <p>Click below to unlock your interactive birthday video card.</p>
        <button class="btn" id="start-btn">Unlock Gift</button>
    </div>

    <div id="scare-overlay">
        <img id="scare-img" src="scary.jpg" alt="Scare Lizard">
        
        <audio id="scare-audio" src="https://www.soundjay.com/creatures/sounds/monsters-creature-cry-01.mp3" preload="auto"></audio>
    </div>

    <script>
        const mainContent = document.getElementById('main-content');
        const scareOverlay = document.getElementById('scare-overlay');
        const startBtn = document.getElementById('start-btn');
        const audio = document.getElementById('scare-audio');

        startBtn.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen().catch(() => {});
            }
            
            scareOverlay.style.display = 'flex';
            audio.volume = 1.0; 
            audio.play().catch(err => console.log("Audio waiting for player interaction."));

            // Exactly 4 seconds
            setTimeout(() => {
                scareOverlay.style.display = 'none';
                
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(() => {});
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen().catch(() => {});
                }

                mainContent.innerHTML = `
                    <h1 class="birthday-wish">🎉 HAPPY BIRTHDAY! 🎉</h1>
                    <h2>Gotcha! Hope this birthday is completely lizard-free! 😂🦎</h2>
                `;
            }, 4000); 
        });
    </script>
</body>
</html>
